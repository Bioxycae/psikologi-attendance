services:
  psikologi-baru:
    container_name: psikologi-baru
    build:
      context: .
    restart: always
    env_file:
      - .env
    networks:
      - proxy-network
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  proxy-network:
    external: true
